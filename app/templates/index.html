<!DOCTYPE html>
<html>
<head>
<title>DevOps ToDo App</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#1f4036,#99f2c8);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
background:white;
padding:40px;
border-radius:10px;
width:420px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h1{
text-align:center;
}

form{
display:flex;
gap:10px;
margin-bottom:20px;
}

input{
flex:1;
padding:10px;
border-radius:5px;
border:1px solid #ccc;
}

button{
background:#2ecc71;
border:none;
color:white;
padding:10px 15px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#27ae60;
}

ul{
list-style:none;
padding:0;
}

li{
display:flex;
justify-content:space-between;
align-items:center;
background:#f4f6f7;
padding:10px;
border-radius:5px;
margin-bottom:8px;
}

.delete{
background:#e74c3c;
padding:5px 10px;
border-radius:4px;
text-decoration:none;
color:white;
}

.delete:hover{
background:#c0392b;
}

.footer{
text-align:center;
font-size:12px;
margin-top:10px;
color:#777;
}

</style>
</head>

<body>

<div class="container">

<h1>DevOps ToDo App</h1>

<form method="POST">
<input type="text" name="task" placeholder="Enter task..." required>
<button type="submit">Add</button>
</form>

<ul>
{% for todo in todos %}
<li>
{{todo.task}}
<a class="delete" href="/delete/{{todo.id}}">Delete</a>
</li>
{% endfor %}
</ul>

<div class="footer">
Powered by Flask • Docker • Jenkins • Kubernetes
</div>

</div>

</body>

</html>
